packages:
  - "packages/*"

allowBuilds:
  '@tree-sitter-grammars/tree-sitter-kotlin': set this to true or false
  esbuild: set this to true or false
  tree-sitter-c: set this to true or false
  tree-sitter-c-sharp: set this to true or false
  tree-sitter-cli: set this to true or false
  tree-sitter-cpp: set this to true or false
  tree-sitter-go: set this to true or false
  tree-sitter-java: set this to true or false
  tree-sitter-javascript: set this to true or false
  tree-sitter-objc: set this to true or false
  tree-sitter-php: set this to true or false
  tree-sitter-python: set this to true or false
  tree-sitter-ruby: set this to true or false
  tree-sitter-rust: set this to true or false
  tree-sitter-typescript: set this to true or false

# Build-script approval (mirrors the workspace root). pnpm v10 reads these here, not
# from package.json; keeps installs run from within understand-anything-plugin (e.g.
# the standalone plugin cache) consistent with the repo root. Replaces the earlier
# invalid "allowBuilds" block (not a real pnpm setting; it held placeholder values).
onlyBuiltDependencies:
  - esbuild
  - sharp
  - '@tree-sitter-grammars/tree-sitter-kotlin'
  - tree-sitter-c
  - tree-sitter-c-sharp
  - tree-sitter-cli
  - tree-sitter-cpp
  - tree-sitter-go
  - tree-sitter-java
  - tree-sitter-javascript
  - tree-sitter-objc
  - tree-sitter-php
  - tree-sitter-python
  - tree-sitter-ruby
  - tree-sitter-rust
  - tree-sitter-typescript
