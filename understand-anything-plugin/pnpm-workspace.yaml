packages:
  - "packages/*"

# Build-script approval (mirrors the workspace root). pnpm v10 reads these here, not
# from package.json; keeps installs run from within understand-anything-plugin (e.g.
# the standalone plugin cache) consistent with the repo root. Replaces the earlier
# invalid "allowBuilds" block (not a real pnpm setting; it held placeholder values).
onlyBuiltDependencies:
  - esbuild
  - sharp
  - '@tree-sitter-grammars/tree-sitter-kotlin'
  - tree-sitter-c
  - tree-sitter-c-sharp
  - tree-sitter-cli
  - tree-sitter-cpp
  - tree-sitter-go
  - tree-sitter-java
  - tree-sitter-javascript
  - tree-sitter-objc
  - tree-sitter-php
  - tree-sitter-python
  - tree-sitter-ruby
  - tree-sitter-rust
  - tree-sitter-typescript
